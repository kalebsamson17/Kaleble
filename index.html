<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaleble</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=STIX+Two+Text:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #f5f5f0;
      --border:    #c8c8c2;
      --text:      #1a1a1a;
      --muted:     #909090;
      --absent:    #d3d3cc;
      --present:   #c4922a;
      --correct:   #3a7a33;
      --present-t: #fff8ec;
      --correct-t: #efffec;
      --toast-bg:  #f5f5f0;
      --toast-fg:  #1a1a1a;
      --toggle-bg: #ddddd8;
    }

    
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      transition: background 0.2s, color 0.2s;
    }

    body {
      width: 100%;
      padding: 0 16px 10px;
      min-height: 100dvh;
      justify-content: flex-start;
      --cell-size: 56px;
      --cell-gap: 6px;
      --grid-width: calc((5 * var(--cell-size)) + (4 * var(--cell-gap)));
    }

    header {
      width: 100%;
      max-width: var(--grid-width);
      padding: 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .header-left {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'STIX Two Text', serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.16em;
      color: var(--text);
      transition: opacity 0.15s;
    }

    .header-left.has-streak h1 {
      opacity: 0;
      pointer-events: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #win-fire {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      background: var(--border);
      border-radius: 999px;
      padding: 3px 8px 3px 6px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #win-fire.show {
      visibility: visible;
      opacity: 1;
    }

    #win-fire .fire-emoji {
      font-size: 0.95rem;
      line-height: 1;
    }

    #win-fire .streak-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #score-display {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--text);
      white-space: nowrap;
      display: flex;
      align-items: baseline;
      gap: 3px;
    }

    #score-display b {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    #score-display .pts-label {
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
    }

    #hint-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #hint-btn:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    #hint-btn:active {
      background: var(--border);
    }

    #hint-btn .hint-cost {
      color: var(--text);
      font-weight: 700;
      opacity: 0.7;
    }

    #theme-toggle {
      background: var(--toggle-bg);
      border: none;
      border-radius: 20px;
      width: 42px;
      height: 24px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #theme-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text);
      transition: transform 0.22s cubic-bezier(.4,0,.2,1), background 0.2s;
    }

    [data-theme="dark"] #theme-toggle::after {
      transform: translateX(18px);
    }

    [data-theme="dark"] {
      --bg:        #0e0e0f;
      --border:    #2a2a2e;
      --text:      #e8e8e6;
      --muted:     #52525a;
      --absent:    #272729;
      --present:   #7c5c1e;
      --correct:   #2d5a27;
      --present-t: #d4972e;
      --correct-t: #4daa45;
      --toast-bg:  #0e0e0f;
      --toast-fg:  #e8e8e6;
      --toggle-bg: #2a2a2e;
    }

    .divider {
      width: 100%;
      max-width: var(--grid-width);
      height: 1px;
      background: var(--border);
      margin: 10px 0 8px;
      transition: background 0.2s;
    }

    #toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--toast-bg);
      color: var(--toast-fg);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      border-radius: 3px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #definition {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: min(var(--grid-width), calc(100% - 32px));
      max-width: var(--grid-width);
      background: var(--bg);
      color: var(--text);
      padding: 14px 18px;
      border-radius: 10px;
      font-family: 'STIX Two Text', serif;
      font-size: 1rem;
      backdrop-filter: blur(6px);
      display: none;
      z-index: 120;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    }

    #definition .def-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      width: 100%;
    }

    #definition button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'STIX Two Text', serif;
    }

    #definition button:active { transform: translateY(1px); }

    #definition.show {
      display: block;
    }

    #definition .def-text {
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 1.15rem;
    }

    #grid-wrapper {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 2px;
    }

    #grid {
      display: grid;
      grid-template-rows: repeat(6, var(--cell-size));
      grid-template-columns: repeat(5, var(--cell-size));
      gap: var(--cell-gap);
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'STIX Two Text', serif;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--text);
      background: transparent;
      user-select: none;
      perspective: 300px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .cell.filled { border-color: var(--muted); }

    .cell-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .cell.pop { animation: pop 0.1s ease-out; }

    @keyframes flipCell {
      0%   { transform: rotateX(0deg); }
      49%  { transform: rotateX(-90deg); }
      51%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }
    }
    .cell.flipping .cell-inner {
      animation: flipCell 0.48s ease-in-out forwards;
    }

    .cell.absent  { background: var(--absent);  border-color: var(--absent);  color: var(--muted); }
    .cell.present { background: var(--present); border-color: var(--present); color: var(--present-t); }
    .cell.correct { background: var(--correct); border-color: var(--correct); color: var(--correct-t); }

    .cell.hinted {
      border-color: var(--muted);
      border-style: dashed;
      color: var(--muted);
    }

    #hint-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
    .cell.shake { animation: shake 0.35s ease; }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-11px); }
    }
    .cell.bounce { animation: bounce 0.38s ease; }

    #keyboard {
      width: 100%;
      max-width: min(500px, 100%);
      margin: 12px 0 4px;
      display: none;
      gap: 8px;
      flex-direction: column;
    }

    .key-row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .key {
      height: 56px;
      min-width: 34px;
      flex: 1;
      max-width: 46px;
      padding: 0 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      touch-action: manipulation;
    }

    .key.wide {
      min-width: 56px;
      max-width: 72px;
      flex: 1.6;
      font-size: 0.72rem;
    }

    .key:active {
      background: var(--border);
    }

    .key.absent {
      opacity: 0.35;
    }

    .show-mobile-keyboard #keyboard {
      display: flex;
    }

    @media (max-width: 420px) {
      body {
        padding: 0 8px 8px;
        --cell-size: 50px;
        --cell-gap: 5px;
      }

      header {
        padding-top: 12px;
      }

      .header-right {
        gap: 6px;
      }

      #hint-btn {
        padding: 5px 7px;
        font-size: 0.58rem;
      }

      .divider {
        margin: 8px 0 6px;
      }

      #grid-wrapper {
        margin-top: 0;
      }

      .cell {
        font-size: 1rem;
      }

      #grid {
        grid-template-rows: repeat(6, var(--cell-size));
        grid-template-columns: repeat(5, var(--cell-size));
      }

      #keyboard {
        margin: 10px 0 4px;
        gap: 7px;
      }

      .key-row {
        gap: 5px;
      }

      .key {
        height: 52px;
        min-width: 30px;
        font-size: 0.78rem;
      }

      .key.wide {
        min-width: 50px;
        font-size: 0.68rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>KALEBLE</h1>
      <span id="win-fire" aria-live="polite" aria-label="No winning streak" title="No winning streak">
        <span class="fire-emoji" aria-hidden="true">🔥</span>
        <span id="streak-count" class="streak-count">0</span>
      </span>
    </div>
    <div class="header-right">
      <div id="score-display"><b id="score-val">0</b> <span class="pts-label">pts</span></div>
      <button id="hint-btn" aria-label="Get a hint for 5 points">
        <span class="hint-cost">−5</span>
        <span class="hint-text">HINT</span>
      </button>
      <button id="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>
  <div class="divider"></div>

  <div id="toast"></div>
  <div id="definition" aria-live="polite"></div>

  <div id="grid-wrapper">
    <div id="grid"></div>
  </div>

  <div id="keyboard" aria-label="On-screen keyboard"></div>

  <script>
    const WORD_BANK = [
"kaleb",
];

    const WORDS = [...new Set(WORD_BANK.map(w => w.toUpperCase()).filter(w => w.length === 5))];
    const WORD_SET = new Set(WORDS);
    const ROWS = 6;
    const COLS = 5;
    const FLIP_STEP = 300;
    const FLIP_DUR = 480;

    let targetWord = '';
    let currentRow = 0;
    let currentCol = 0;
    let currentGuess = [];
    let locked = false;
    let score = parseInt(localStorage.getItem('wrdl_score') || '0', 10);
    let usedWords = JSON.parse(localStorage.getItem('wrdl_used') || '[]');
    let streak = parseInt(localStorage.getItem('wrdl_streak') || (localStorage.getItem('wrdl_won_once') === '1' ? '1' : '0'), 10);
    if (!Number.isFinite(streak) || streak < 0) streak = 0;

    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score-val');
    const toastEl = document.getElementById('toast');
    const defEl = document.getElementById('definition');
    const toggleEl = document.getElementById('theme-toggle');
    const keyboardEl = document.getElementById('keyboard');
    const winFireEl = document.getElementById('win-fire');
    const streakCountEl = document.getElementById('streak-count');
    let toastTmr = null;
    const MOBILE_QUERY = window.matchMedia('(max-width: 700px), (pointer: coarse)');

    const savedTheme = localStorage.getItem('wrdl_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    const hintBtn = document.getElementById('hint-btn');

    toggleEl.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('wrdl_theme', next);
    });

    const HINT_COST = 5;
    let hintUsedThisRow = false;

    function updateHintBtn() {
      const canAfford = score >= HINT_COST;
      const rowFull   = currentCol >= COLS;
      hintBtn.disabled = locked || !canAfford || hintUsedThisRow || rowFull;
    }

    hintBtn.addEventListener('click', () => {
      if (locked || hintUsedThisRow || currentCol >= COLS || score < HINT_COST) return;

      const letterToPlace = targetWord[currentCol];

      currentGuess.push(letterToPlace);
      const cell = getCell(currentRow, currentCol);
      setCellLetter(currentRow, currentCol, letterToPlace);
      cell.classList.remove('pop', 'filled');
      cell.classList.add('filled', 'pop');
      void cell.offsetWidth;
      currentCol++;

      hintUsedThisRow = true;
      score = Math.max(0, score - HINT_COST);
      saveScore();
      updateScore();
      updateHintBtn();
    });

    function buildGrid() {
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell  = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${r}-${c}`;
          const inner = document.createElement('div');
          inner.className = 'cell-inner';
          cell.appendChild(inner);
          gridEl.appendChild(cell);
        }
      }
    }

    function buildKeyboard() {
      keyboardEl.innerHTML = '';

      const rows = [
        ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
        ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
        ['Enter', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', 'Backspace']
      ];

      rows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'key-row';

        row.forEach(label => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'key';
          button.textContent = label === 'Backspace' ? 'DEL' : label;
          if (label === 'Enter' || label === 'Backspace') button.classList.add('wide');
          button.addEventListener('click', () => handleInput(label));
          rowEl.appendChild(button);
        });

        keyboardEl.appendChild(rowEl);
      });
    }

    function setMobileLayout() {
      document.body.classList.toggle('show-mobile-keyboard', MOBILE_QUERY.matches);
    }

    function handleInput(key) {
      if (locked) return;
      if (key === 'Enter') {
        submitGuess();
        return;
      }

      if (key === 'Backspace') {
        deleteLetter();
        return;
      }

      addLetter(key.toUpperCase());
    }

    function getCell(r, c) { return document.getElementById(`cell-${r}-${c}`); }
    function getCellInner(r, c) { return getCell(r, c).querySelector('.cell-inner'); }
    function setCellLetter(r, c, l) { getCellInner(r, c).textContent = l; }

    function toast(msg, ms = 1600) {
      clearTimeout(toastTmr);
      toastEl.textContent = msg;
      toastEl.classList.add('show');

      if (ms > 0) {
        toastTmr = setTimeout(() => toastEl.classList.remove('show'), ms);
      }
    }

    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function fetchDefinition(word) {
      if (!word) return;
      if (!defEl) return;

      
      locked = true;
      defEl.classList.add('show');
      
      defEl.innerHTML = `<div class="def-text">${escapeHtml(word.toUpperCase())}</div>` +
                        `<div class="def-actions"><button id="def-google">DEFINE</button><button id="def-continue">CONTINUE</button></div>`;

      const gBtn = document.getElementById('def-google');
      const cBtn = document.getElementById('def-continue');
      if (gBtn) gBtn.addEventListener('click', () => {
        try { window.open(`https://www.google.com/search?q=define+${encodeURIComponent(word)}`, '_blank'); } catch (e) {}
      });

      if (cBtn) cBtn.addEventListener('click', () => {
        clearTimeout(toastTmr);
        toastEl.classList.remove('show');
        defEl.classList.remove('show');
        startGame();
      });
    }

    function updateScore() { scoreEl.textContent = score; }
    function saveScore() { localStorage.setItem('wrdl_score', score); }

    function setStreak(value) {
      streak = Math.max(0, value);
      localStorage.setItem('wrdl_streak', String(streak));
      localStorage.setItem('wrdl_won_once', streak > 0 ? '1' : '0');
      updateWinFire();
    }

    function updateWinFire() {
      const hasStreak = streak > 0;
      winFireEl.classList.toggle('show', hasStreak);
      streakCountEl.textContent = streak;
      winFireEl.setAttribute('aria-label', hasStreak ? `${streak} word winning streak` : 'No winning streak');
      winFireEl.title = hasStreak ? `${streak} word winning streak` : 'No winning streak';
      document.querySelector('.header-left').classList.toggle('has-streak', hasStreak);
    }

    function pickWord() {
      let pool = WORDS.filter(w => !usedWords.includes(w));
      if (pool.length === 0) {
        usedWords = [];
        localStorage.setItem('wrdl_used', '[]');
        pool = WORDS;
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function resetKeyboard() {
      document.querySelectorAll('.key').forEach(key => {
        key.classList.remove('absent', 'present', 'correct');
      });
    }

    function startGame() {
      targetWord   = pickWord();
      currentRow   = 0;
      currentCol   = 0;
      currentGuess = [];
      locked       = false;
      hintUsedThisRow = false;
      buildGrid();
      resetKeyboard();
      updateScore();
      updateWinFire();
      updateHintBtn();
    }

    document.addEventListener('keydown', e => {
      if (locked) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      if      (e.key === 'Enter')              submitGuess();
      else if (e.key === 'Backspace')          deleteLetter();
      else if (/^[a-zA-Z]$/.test(e.key))       addLetter(e.key.toUpperCase());
    });

    function addLetter(letter) {
      if (currentCol >= COLS) return;
      currentGuess.push(letter);
      const cell = getCell(currentRow, currentCol);
      setCellLetter(currentRow, currentCol, letter);
      cell.classList.add('filled');
      cell.classList.remove('pop');
      void cell.offsetWidth;
      cell.classList.add('pop');
      currentCol++;
      updateHintBtn();
    }

    function deleteLetter() {
      if (currentCol <= 0) return;
      currentCol--;
      currentGuess.pop();
      const cell = getCell(currentRow, currentCol);
      setCellLetter(currentRow, currentCol, '');
      if (cell.classList.contains('hinted')) {
        cell.classList.remove('hinted');
        hintUsedThisRow = false;
      }
      cell.classList.remove('filled', 'pop');
      updateHintBtn();
    }

    function submitGuess() {
      if (currentCol < COLS) {
        shakeRow(currentRow);
        toast('NOT ENOUGH LETTERS');
        return;
      }

      const guess = currentGuess.join('');

      if (!WORD_SET.has(guess)) {
        shakeRow(currentRow);
        toast('NOT IN WORD LIST');
        return;
      }

      locked = true;
      updateHintBtn();

      const results = evaluateGuess(guess);

      revealRow(currentRow, results, () => {
        const won = guess === targetWord;

        if (won) {
          const tries = currentRow + 1;
          const points = ROWS - currentRow;
          score += points;
          saveScore();
          updateScore();
          usedWords.push(targetWord);
          localStorage.setItem('wrdl_used', JSON.stringify(usedWords));
          setStreak(streak + 1);
          fetchDefinition(targetWord);
          bounceRow(currentRow, () => {
            toast(`${tries} ${tries === 1 ? 'TRY' : 'TRIES'} = ${points} ${points === 1 ? 'POINT' : 'POINTS'}`, 0);
          });
        } else if (currentRow === ROWS - 1) {
          setStreak(0);
          fetchDefinition(targetWord);
          toast(targetWord, 0);
        } else {
          currentRow++;
          currentCol   = 0;
          currentGuess = [];
          locked       = false;
          hintUsedThisRow = false;
          updateHintBtn();
        }
      });
    }

    function evaluateGuess(guess) {
      const result    = Array(COLS).fill('absent');
      const targetArr = targetWord.split('');
      const guessArr  = guess.split('');
      const claimed   = Array(COLS).fill(false);

      for (let i = 0; i < COLS; i++) {
        if (guessArr[i] === targetArr[i]) {
          result[i]   = 'correct';
          claimed[i]  = true;
          guessArr[i] = null;
        }
      }

      for (let i = 0; i < COLS; i++) {
        if (result[i] === 'correct') continue;
        for (let j = 0; j < COLS; j++) {
          if (!claimed[j] && guessArr[i] === targetArr[j]) {
            result[i]  = 'present';
            claimed[j] = true;
            break;
          }
        }
      }

      return result;
    }

    function revealRow(row, results, onDone) {
      for (let i = 0; i < COLS; i++) {
        const cell  = getCell(row, i);
        setTimeout(() => {
          cell.classList.remove('filled', 'pop');
          cell.classList.add('flipping');
          setTimeout(() => {
            cell.classList.add(results[i]);
            const letter = getCellInner(row, i).textContent;
            const keyEl = [...document.querySelectorAll('.key')].find(k => k.textContent === letter);
            if (keyEl && !keyEl.classList.contains('correct') && !keyEl.classList.contains('present')) {
              keyEl.classList.add(results[i]);
            }
          }, FLIP_DUR / 2);
          setTimeout(() => {
            cell.classList.remove('flipping');
            if (i === COLS - 1) onDone();
          }, FLIP_DUR);
        }, i * FLIP_STEP);
      }
    }

    function shakeRow(row) {
      for (let c = 0; c < COLS; c++) {
        const cell = getCell(row, c);
        cell.classList.remove('shake');
        void cell.offsetWidth;
        cell.classList.add('shake');
        setTimeout(() => cell.classList.remove('shake'), 400);
      }
    }

    function bounceRow(row, onDone) {
      for (let c = 0; c < COLS; c++) {
        setTimeout(() => {
          const cell = getCell(row, c);
          cell.classList.add('bounce');
          setTimeout(() => cell.classList.remove('bounce'), 400);
          if (c === COLS - 1) setTimeout(onDone, 420);
        }, c * 75);
      }
    }

    buildKeyboard();
    setMobileLayout();
    MOBILE_QUERY.addEventListener('change', setMobileLayout);
    startGame();
  </script>
</body>
